name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (static export)
        env:
          # If your repo is at https://<user>.github.io/<repo>/, set this to "/<repo>".
          # For a user/organization site (https://<user>.github.io/) leave it blank.
          NEXT_PUBLIC_BASE_PATH: /strategy-dashboard
        run: npm run build
      - name: Add .nojekyll
        run: touch ./out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
